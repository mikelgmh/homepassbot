name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun test
        env:
          ADMIN_ID: 12345
          HA_URL: https://homeassistant.example.com
          HA_TOKEN: fake-ha-token-for-tests
